<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palindrome Checker Plus</title>
    <link rel="stylesheet" href="style5.css">
</head>
<body>
    <div class="container">
        <h1>Palindrome Checker Plus</h1>
        <p class="intro">Enter a word or phrase to see if it is a palindrome.</p>

        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/0b/Check_green_circle.svg/1024px-Check_green_circle.svg.png" alt="Check icon" class="hero-image">

        <form id="palindromeForm">
            <label for="userText">Enter a word or phrase:</label>
            <input type="text" id="userText" name="userText" placeholder="Example: racecar">
            <button type="submit">Check Palindrome</button>
        </form>

        <div id="messageBox"></div>
        <div id="detailsBox"></div>
    </div>

    <script src="main4.js"></script>
</body>
</html>
